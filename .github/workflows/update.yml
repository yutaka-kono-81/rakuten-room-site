name: 楽天ROOM 自動更新

on:
  # 毎日 午前9時（JST）に自動実行
  schedule:
    - cron: '0 0 * * *'
  # 手動実行も可能
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Chrome と ChromeDriver をセットアップ
        uses: browser-actions/setup-chrome@v1

      - name: 依存パッケージをインストール
        run: |
          pip install selenium requests beautifulsoup4

      - name: 楽天ROOMをスクレイピングして items.json を更新
        run: python scrape_room.py

      - name: 変更をコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add items.json
          git diff --staged --quiet || git commit -m "chore: 楽天ROOM 商品データを自動更新 $(date +'%Y-%m-%d')"
          git push
